<body>
  <main class="page">
    <div class="top">
      <a class="back" href="./">← 同窓会ページへ戻る</a>
    </div>

    <section class="card">
      <div class="hero">
        <div class="eyebrow">UNMATCHED RESPONSES</div>
        <h1>反映されていない方はこちら</h1>
        <p class="lead">
          フォームには回答がありますが、名簿と自動一致しなかった回答を確認できます。
        </p>
      </div>

      <div class="body">
        <div class="notice">
          旧姓・漢字違い・現在のお名前で入力された場合など、名簿と一致しなかった回答がここに表示されます。<br>
          ここに表示されても、回答自体はGoogleフォームの回答シートに残っています。
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>クラス</th>
                <th>出席番号</th>
                <th>入力名</th>
                <th>出欠</th>
                <th>回答日時</th>
              </tr>
            </thead>
            <tbody id="unmatchedBody">
              <tr><td colspan="5">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>

        <p class="footer-note">
          ※ 表は左右にスワイプして確認できます。ここに名前がある場合は、フォーム回答シートを見ながら名簿側の表記を確認してください。
        </p>
      </div>
    </section>
  </main>

  <script>
    function revealPage() {}
const CONFIG = {
      build: '20260702-remove-class-buttons',
      gasUrl: 'https://script.google.com/macros/s/AKfycbzzVAS5B2iTJ0r9vSt6UYEHIvcLUukGqpH2h7D-f_02_7pCZr56M72UkZPpFJXsE4QoPA/exec',
      token: 'shimasho2026'
    };

    function loadData() {
      const callbackName = 'jsonpCallback_' + Date.now();
      const script = document.createElement('script');
      const url = CONFIG.gasUrl + '?token=' + encodeURIComponent(CONFIG.token) + '&callback=' + callbackName;

      window[callbackName] = function(data) {
        try {
          if (!data || !data.ok) {
            renderError(data && data.error ? data.error : '読み込みに失敗しました');
            return;
          }
          renderUnmatched(data.unmatchedResponses || []);
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      script.onerror = function() {
        renderError('Apps Scriptからデータを読み込めませんでした。');
        delete window[callbackName];
        script.remove();
      };

      script.src = url;
      document.body.appendChild(script);
    }

    function renderUnmatched(items) {
      const tbody = document.getElementById('unmatchedBody');
      tbody.innerHTML = '';

      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="5">未照合の回答はありません。</td></tr>';
        return;
      }

      items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(item.className || '')}</td>
          <td>${escapeHtml(item.number || '')}</td>
          <td class="name">${escapeHtml(item.name || '')}</td>
          <td><span class="chip">${escapeHtml(item.status || '未回答')}</span></td>
          <td>${escapeHtml(formatDateTime(item.timestamp || ''))}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderError(message) {
      document.getElementById('unmatchedBody').innerHTML =
        '<tr><td colspan="5">エラー：' + escapeHtml(message) + '</td></tr>';
    }

    function formatDateTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (isNaN(date.getTime())) return String(value);
      return date.toLocaleString('ja-JP');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    loadData();
  </script>
